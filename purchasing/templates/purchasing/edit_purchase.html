{% extends 'base.html' %}

{% block content %}

<h1>

    Update Purchase Request

</h1>

<p>

    Part:
    {{ purchase.part_name }}

</p>

<p>

    Quantity:
    {{ purchase.quantity }}

</p>

<p>

    Notes:
    {{ purchase.notes }}

</p>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button class="btn btn-success">

        Save

    </button>

</form>

{% endblock %}
